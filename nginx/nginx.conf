# Detrás de un reverse proxy HTTPS (credenciales.enap.edu.co)
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name credenciales.enap.edu.co localhost;

    server_tokens off;
    client_max_body_size 25m;

    root /usr/share/nginx/html;
    index index.html;

    # API → contenedor NestJS (misma red Docker: credentials_internal)
    location ^~ /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Cookies HttpOnly / CSRF
        proxy_set_header Cookie $http_cookie;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* ^(?!/api/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
