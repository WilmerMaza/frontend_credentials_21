@if (isMobile()) {
  <!-- Vista móvil -->
  <div class="m-page">
    <main class="m-content">
      <app-breadcrumb></app-breadcrumb>
      <h1 class="m-title">Personal registrado</h1>
      <p class="m-subtitle">Gestione y consulte el personal militar registrado en el sistema.</p>

      <!-- Métricas (scroll horizontal) -->
      <app-personal-metrics [statCards]="statCards()" [isMobile]="true"></app-personal-metrics>

      <!-- Filtros + CTA -->
      <app-personal-search
        [isMobile]="true"
        [searchForm]="searchForm"
        [(filtersExpanded)]="filtersExpanded"
        (search)="onSearch()"
        (clearSearch)="onClearSearch()"
        (register)="navigateToRegistration()"
      ></app-personal-search>

      <!-- Lista móvil con registros y paginación -->
      <app-personal-list-mobile
        [loading]="loading()"
        [syncing]="syncing()"
        [pagedData]="pagedData()"
        [filteredDataLength]="filteredData().length"
        [paginationHint]="getPaginationHint()"
        [pageIndex]="pageIndex()"
        [totalPages]="totalPages()"
        [pageNumbers]="pageNumbers()"
        (view)="onView($event)"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)"
        (pageChange)="goToPage($event)"
      ></app-personal-list-mobile>

      <div class="m-footer">ENAP © 2026</div>
    </main>
  </div>
} @else {
  <!-- Vista desktop -->
  <div class="pr-container">
    <app-breadcrumb></app-breadcrumb>

    <!-- Page Head -->
    <div class="pr-header">
      <div>
        <h1 class="pr-header__title">Personal registrado</h1>
        <p class="pr-header__subtitle">
          Gestione y consulte el personal militar registrado en el sistema.
        </p>
      </div>
      <button class="pr-header__btn" (click)="navigateToRegistration()">
        <mat-icon>add</mat-icon>
        Registrar nuevo personal
      </button>
    </div>

    <!-- Metrics -->
    <app-personal-metrics [statCards]="statCards()" [isMobile]="false"></app-personal-metrics>

    <!-- Table Card -->
    <div class="pr-table-card">
      <!-- Filtros Desktop -->
      <app-personal-search
        [isMobile]="false"
        [searchForm]="searchForm"
        [(filtersExpanded)]="filtersExpanded"
        (search)="onSearch()"
        (clearSearch)="onClearSearch()"
      ></app-personal-search>

      <!-- Tabla Desktop con registros y paginación -->
      <app-personal-table-desktop
        [loading]="loading()"
        [syncing]="syncing()"
        [pagedData]="pagedData()"
        [filteredDataLength]="filteredData().length"
        [paginationHint]="getPaginationHint()"
        [pageIndex]="pageIndex()"
        [totalPages]="totalPages()"
        [pageNumbers]="pageNumbers()"
        (view)="onView($event)"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)"
        (pageChange)="goToPage($event)"
      ></app-personal-table-desktop>
    </div>
  </div>
}
