<button
  type="button"
  class="card"
  [class.blue]="button().tone === 'blue'"
  [class.green]="button().tone === 'green'"
  [class.orange]="button().tone === 'orange'"
  [class.purple]="button().tone === 'purple'"
  [class.red]="button().tone === 'red'"
  [class.featured]="button().featured"
  (click)="goTo(button().route)"
  [attr.aria-label]="'Ir a ' + button().title"
>
  <div class="card-top">
    <span class="icon" aria-hidden="true">
      @if (button().iconName) {
        <mat-icon>{{ button().iconName }}</mat-icon>
      } @else {
        {{ button().icon }}
      }
    </span>
    <span class="title">{{ button().title }}</span>
  </div>

  @if (button().total !== undefined && button().total !== null) {
    <div class="total">{{ button().total }}</div>
  }
  @if (button().description) {
    <p class="description">{{ button().description }}</p>
  }

  @if (button().subtitle) {
    <div class="subtitle">{{ button().subtitle }}</div>
  }

  <div class="cta">
    {{ button().featured ? 'Acceder' : 'Ir' }} <span aria-hidden="true">→</span>
  </div>
</button>
