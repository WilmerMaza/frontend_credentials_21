@if (isMobile()) {
  <div class="m-page">
    <main class="m-content">
      <app-breadcrumb></app-breadcrumb>

      <header class="m-header">
        <div>
          <h1 class="m-title">Personal registrado</h1>
          <p class="m-subtitle">Gestione y consulte el personal militar registrado en el sistema.</p>
        </div>
        <button
          mat-flat-button
          color="primary"
          type="button"
          class="m-header__btn"
          (click)="navigateToRegistration()"
        >
          <mat-icon>add</mat-icon>
          Registrar
        </button>
      </header>

      <app-personal-metrics
        [statCards]="statCards()"
        [isMobile]="true"
        [filtersActive]="hasActiveFilters()"
        [(filtersExpanded)]="filtersExpanded"
      ></app-personal-metrics>

      <app-personal-search
        [isMobile]="true"
        [searchForm]="searchForm"
        [statusOptions]="statusFilterOptions"
        [(filtersExpanded)]="filtersExpanded"
        (search)="onSearch()"
        (clearSearch)="onClearSearch()"
      ></app-personal-search>

      @if (apiError()) {
        <div class="pr-api-error">{{ apiError() }}</div>
      }

      <app-personal-list-mobile
        [loading]="loading()"
        [syncing]="syncing()"
        [pagedData]="pagedData()"
        [filteredDataLength]="totalRecords()"
        [paginationHint]="getPaginationHint()"
        [pageIndex]="pageIndex()"
        [totalPages]="totalPages()"
        [pageNumbers]="pageNumbers()"
        [pageSize]="pageSize()"
        [pageSizeOptions]="PAGE_SIZE_OPTIONS"
        [showPageSize]="true"
        (view)="onView($event)"
        (edit)="onEdit($event)"
        (pageChange)="goToPage($event)"
        (pageSizeChange)="onPageSizeChange($event)"
      ></app-personal-list-mobile>

      <div class="m-footer">ENAP © 2026</div>
    </main>
  </div>
} @else {
  <div class="pr-container">
    <app-breadcrumb></app-breadcrumb>

    <header class="pr-header">
      <div class="pr-header__copy">
        <h1 class="pr-header__title">Personal registrado</h1>
        <p class="pr-header__subtitle">
          Gestione y consulte el personal militar registrado en el sistema.
        </p>
      </div>
      <button
        mat-flat-button
        color="primary"
        class="pr-header__btn"
        type="button"
        (click)="navigateToRegistration()"
      >
        <mat-icon>add</mat-icon>
        Registrar nuevo personal
      </button>
    </header>

    <app-personal-metrics
      [statCards]="statCards()"
      [isMobile]="false"
      [filtersActive]="hasActiveFilters()"
      [(filtersExpanded)]="filtersExpanded"
    ></app-personal-metrics>

    <section class="pr-content">
      <app-personal-search
        [isMobile]="false"
        [searchForm]="searchForm"
        [statusOptions]="statusFilterOptions"
        [(filtersExpanded)]="filtersExpanded"
        (search)="onSearch()"
        (clearSearch)="onClearSearch()"
      ></app-personal-search>

      @if (apiError()) {
        <div class="pr-api-error">{{ apiError() }}</div>
      }

      <app-personal-table-desktop
        [loading]="loading()"
        [syncing]="syncing()"
        [pagedData]="pagedData()"
        [filteredDataLength]="totalRecords()"
        [paginationHint]="getPaginationHint()"
        [pageIndex]="pageIndex()"
        [totalPages]="totalPages()"
        [pageNumbers]="pageNumbers()"
        [pageSize]="pageSize()"
        [pageSizeOptions]="PAGE_SIZE_OPTIONS"
        [showPageSize]="true"
        (view)="onView($event)"
        (edit)="onEdit($event)"
        (pageChange)="goToPage($event)"
        (pageSizeChange)="onPageSizeChange($event)"
      ></app-personal-table-desktop>
    </section>
  </div>
}
